<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aitori — live traffic</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
  header { padding: 12px 16px; border-bottom: 1px solid #8884; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .sub { color: #8889; font-size: 12px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; margin-right: 4px; vertical-align: middle; }
  .dot.off { background: #e74c3c; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #8882; white-space: nowrap; }
  th { position: sticky; top: 0; background: Canvas; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #8889; }
  td.url { white-space: normal; word-break: break-all; max-width: 40ch; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: #8889; }
  .tag { font-size: 11px; padding: 1px 6px; border-radius: 10px; border: 1px solid #8886; }
  .reroute { color: #2563eb; border-color: #2563eb88; }
  .gateway-mitm { color: #7c3aed; border-color: #7c3aed88; }
  .gateway-gap { color: #d97706; border-color: #d9770688; }
  .passthrough { color: #6b7280; border-color: #6b728088; }
  .block { color: #dc2626; border-color: #dc262688; }
  .ok { color: #16a34a; }
  .warn { color: #d97706; }
  .err { color: #dc2626; }
  .empty { color: #8889; padding: 24px; text-align: center; }
  #rows tr:first-child { animation: flash .6s ease-out; }
  @keyframes flash { from { background: #2563eb22; } to { background: transparent; } }
</style>
</head>
<body>
<header>
  <h1>aitori — live traffic</h1>
  <span class="sub"><span id="dot" class="dot off"></span><span id="state">connecting…</span></span>
  <span class="sub">inspect &amp; passthrough · newest first · in-memory (last 500)</span>
</header>
<table>
  <thead>
    <tr>
      <th>Time</th><th>App</th><th>Category</th><th>Action</th>
      <th>Method</th><th>URL</th><th>Status</th><th>ms</th>
    </tr>
  </thead>
  <tbody id="rows">
    <tr id="empty-row"><td colspan="8" class="empty">no traffic yet — send a request through aitori</td></tr>
  </tbody>
</table>
<script>
(function () {
  var tbody = document.getElementById("rows");
  var dot = document.getElementById("dot");
  var state = document.getElementById("state");

  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : s); return d.innerHTML; }
  function timeStr(t) { if (!t) return "—"; var d = new Date(t); return isNaN(d) ? esc(t) : d.toLocaleTimeString(); }
  function statusCls(c) { return c >= 500 ? "err" : c >= 400 ? "warn" : c > 0 ? "ok" : ""; }
  function actionTag(e) {
    var label, cls, tip;
    if (e.action === "block") {
      label = "block"; cls = "block"; tip = "denied by policy";
    } else if (e.action === "reroute" && e.rerouted) {
      label = "reroute"; cls = "reroute"; tip = "sent to the gateway";
    } else if (e.action === "reroute" && e.gateway_gap) {
      label = "gateway-gap"; cls = "gateway-gap"; tip = "gateway unreachable — passed through (fail-open)";
    } else if (e.action === "reroute") {
      label = "gateway-mitm"; cls = "gateway-mitm"; tip = "gateway-bound: would reroute if a gateway were configured — inspected, passed through";
    } else {
      label = "passthrough"; cls = "passthrough"; tip = "not a governed call — forwarded untouched";
    }
    return '<span class="tag ' + cls + '" title="' + tip + '">' + esc(label) + '</span>';
  }
  function row(e) {
    var tr = document.createElement("tr");
    var url = esc((e.host || "") + (e.path || ""));
    tr.innerHTML =
      '<td class="mono">' + timeStr(e.time) + '</td>' +
      '<td>' + (e.app ? esc(e.app) : "—") + '</td>' +
      '<td>' + (e.category ? esc(e.category) : "—") + '</td>' +
      '<td>' + actionTag(e) + '</td>' +
      '<td class="mono">' + esc(e.method) + '</td>' +
      '<td class="url" title="' + url + '">' + url + '</td>' +
      '<td class="' + statusCls(e.status) + '">' + (e.status ? e.status : (e.error ? "err" : "—")) + '</td>' +
      '<td class="mono">' + (e.duration_ms != null ? e.duration_ms : "—") + '</td>';
    return tr;
  }
  function prepend(e) {
    var empty = document.getElementById("empty-row");
    if (empty) empty.remove();
    tbody.insertBefore(row(e), tbody.firstChild);
    while (tbody.children.length > 1000) tbody.removeChild(tbody.lastChild);
  }

  // Seed with the current snapshot (already newest-first), oldest appended last.
  fetch("events").then(function (r) { return r.json(); }).then(function (list) {
    if (!list || !list.length) return;
    for (var i = list.length - 1; i >= 0; i--) prepend(list[i]);
  }).catch(function () {});

  try {
    var es = new EventSource("stream");
    es.onopen = function () { dot.className = "dot"; state.textContent = "live"; };
    es.onerror = function () { dot.className = "dot off"; state.textContent = "reconnecting…"; };
    es.onmessage = function (ev) { prepend(JSON.parse(ev.data)); };
  } catch (e) {
    state.textContent = "live updates unsupported (snapshot only)";
  }
})();
</script>
</body>
</html>
