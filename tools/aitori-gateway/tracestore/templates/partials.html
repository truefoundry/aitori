{{define "styles"}}<style>
  :root { --bg:#0f1115; --panel:#171a21; --fg:#e6e6e6; --muted:#9aa4b2; --line:#262b34; --accent:#6ea8fe; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  h1 { font-size:16px; padding:14px 18px; margin:0; border-bottom:1px solid var(--line); }
  h1 a, a { color:var(--accent); text-decoration:none; }
  h1 a:hover, a:hover { text-decoration:underline; }
  h2 { font-size:15px; margin:16px 18px 4px; }
  h3 { font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:18px 18px 6px; }
  .banner { padding:8px 18px; color:var(--muted); border-bottom:1px solid var(--line); margin:0; }
  form { display:flex; gap:8px; padding:12px 18px; flex-wrap:wrap; border-bottom:1px solid var(--line); }
  input, select, button { background:var(--panel); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px 10px; font:inherit; }
  button { background:var(--accent); color:#0b1020; border:0; cursor:pointer; font-weight:600; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; color:var(--muted); font-weight:600; font-size:12px; padding:8px 12px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); }
  td { padding:7px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
  tr:hover td { background:var(--panel); }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }
  .url { max-width:520px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ok { color:#5ad19b; } .warn { color:#e6c07b; } .err { color:#f07178; }
  .empty { color:var(--muted); text-align:center; padding:24px; }
  .k { color:var(--muted); white-space:nowrap; padding-right:16px; }
  .v { word-break:break-all; }
  .event { margin:0 18px 12px; border:1px solid var(--line); border-radius:8px; padding:10px 12px; background:var(--panel); }
  .ename { font-weight:600; margin-bottom:6px; }
  pre { margin:4px 0 0; padding:10px; background:var(--bg); border:1px solid var(--line); border-radius:6px; overflow:auto; max-height:340px; white-space:pre-wrap; word-break:break-word; }
  .jsonview { margin:4px 0 0; padding:10px; background:var(--bg); border:1px solid var(--line); border-radius:6px; overflow:auto; max-height:440px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px; }
  .jsonview summary { cursor:pointer; color:var(--muted); list-style:none; }
  .jsonview summary::-webkit-details-marker { display:none; }
  .jsonview summary::before { content:"▸ "; color:var(--muted); }
  .jsonview details[open] > summary::before { content:"▾ "; }
  ul.jsontree { list-style:none; margin:0; padding-left:16px; border-left:1px solid var(--line); }
  ul.jsontree li { padding:1px 0; }
  .jkey { color:var(--accent); }
  .jstring { color:#7FD1B9; } .jnumber { color:#e6c07b; } .jboolean { color:#c678dd; } .jnull { color:var(--ink-3); }
</style>{{end}}
